    <body>
        <main>
            <section class="order_delivery">
                <div class="container">
                    <div class="steps mobile"><span>Шаг 3</span><span class="active">Адрес получения</span></div>
                    <div class="steps desktop"><a href="order_personal.html">Личные данные</a><img src="images/steps_arrow.svg"><a href="order_personal.html">Способ доставки</a><img src="images/steps_arrow.svg"><span class="active">Адрес получения</span><img src="images/steps_arrow.svg"><span>Оплата</span></div>
                    <h1>Введите адрес  доставки</h1>
                    <form>
                        <fieldset class="text">
                            <input type="text" name="street" placeholder="" required>
                            <label>Улица</label>
                        </fieldset>
                        <div class="row">
                            <fieldset class="text">
                                <input type="text" name="house" placeholder="" required>
                                <label>Дом</label>
                            </fieldset>
                            <fieldset class="text">
                                <input type="text" name="building" placeholder="" required>
                                <label>Корпус</label>
                            </fieldset>
                            <fieldset class="text">
                                <input type="text" name="apartment" placeholder="" required>
                                <label>Квартира</label>
                            </fieldset>
                        </div>
                        <div class="buttons">
                            <button class="border" onclick="history.back()"><img src="images/back_arrow.svg"><span>Назад</span></button><a class="button" href="payment.html">Далее</a>
                        </div>
                    </form>
                </div>
            </section>
        </main>
